    <style>
        .game-page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 70px 20px 20px;
            user-select: none;
        }

        .container {
            max-width: 700px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            margin-top: 10px;
        }

        .game-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .game-header h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
        }

        .header p {
            color: #888;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* 进度条 */
        .progress-section {
            margin-bottom: 20px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 6px;
        }

        .progress-bar {
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9eb5, var(--primary-color));
            border-radius: 4px;
            transition: width 0.5s ease;
            width: 0%;
        }

        /* 得分 */
        .score-display {
            text-align: center;
            margin-bottom: 20px;
        }

        .score-display .score {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
        }

        .score-display .score-label {
            color: #888;
            font-size: 0.9rem;
        }

        /* 问题区域 */
        .question-area {
            margin-bottom: 25px;
        }

        .question-number {
            color: var(--primary-color);
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .question-text {
            font-size: 1.2rem;
            color: #333;
            font-weight: bold;
            line-height: 1.6;
        }

        /* 选项 */
        .options {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            padding: 14px 20px;
            background: #f8f8f8;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            color: #444;
            transition: all 0.3s;
            font-family: inherit;
            text-align: left;
        }

        .option:hover:not(.disabled) {
            background: #fff5f8;
            border-color: #ff9eb5;
        }

        .option.selected {
            border-color: var(--primary-color);
            background: #fff5f8;
        }

        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
            color: #2e7d32;
        }

        .option.wrong {
            border-color: #f44336;
            background: #ffebee;
            color: #c62828;
        }

        .option.disabled {
            cursor: default;
            opacity: 0.7;
        }

        .option.disabled:hover {
            background: #f8f8f8;
            border-color: #eee;
        }

        .option.correct.disabled {
            opacity: 1;
        }

        /* 反馈 */
        .feedback {
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #4caf50;
        }

        .feedback.wrong {
            background: #ffebee;
            color: #c62828;
            border-left: 4px solid #f44336;
        }

        .feedback .source {
            display: block;
            margin-top: 6px;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        /* 下一题按钮 */
        .next-btn {
            display: none;
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3);
            font-family: inherit;
            font-weight: bold;
            margin: 0 auto;
        }

        .next-btn.show {
            display: block;
        }

        .next-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(233, 30, 99, 0.4);
        }

        /* 结果页面 */
        .result {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result .big-icon {
            font-size: 5rem;
            margin-bottom: 10px;
        }

        .result h2 {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .result .rank {
            font-size: 1.5rem;
            color: #555;
            margin-bottom: 15px;
        }

        .result .detail {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 8px;
        }

        .result .detail span {
            color: var(--primary-color);
            font-weight: bold;
        }

        .result .message {
            background: #fff5f8;
            padding: 15px;
            border-radius: 12px;
            margin: 15px 0;
            color: #666;
            font-style: italic;
        }

        .result .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            font-weight: bold;
            border: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: white;
            color: var(--primary-color);
            border: 2px solid var(--primary-color);
        }

        .btn-secondary:hover {
            background: #fff5f8;
        }

        .back-link {
            color: #999;
            text-decoration: none;
            font-size: 0.85rem;
            margin-top: 20px;
            display: inline-block;
            transition: color 0.3s;
        }

        .back-link:hover { color: var(--primary-color); }

        /* 开始页面 */
        .start-screen {
            text-align: center;
            padding: 30px 0;
        }

        .start-screen .mascot {
            font-size: 5rem;
            margin-bottom: 15px;
        }

        .start-screen h2 {
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 10px;
        }

        .start-screen p {
            color: #888;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .start-screen .rules {
            background: #f8f8f8;
            border-radius: 12px;
            padding: 15px 20px;
            text-align: left;
            margin: 15px 0 25px;
        }

        .start-screen .rules li {
            color: #666;
            margin: 6px 0;
            font-size: 0.9rem;
            list-style: none;
        }

        .start-screen .rules li::before {
            content: '✦ ';
            color: var(--primary-color);
        }

        .btn-start {
            padding: 14px 45px;
            font-size: 1.2rem;
        }

        .question-area.hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .container { padding: 20px; }
            .game-header h1 { font-size: 1.4rem; }
            .question-text { font-size: 1.05rem; }
            .option { padding: 12px 15px; font-size: 0.95rem; }
            .result .big-icon { font-size: 3.5rem; }
        }
    </style>
</head>

            {

            },
            {

                options: ['FPS射击', '角色扮演RPG', '休闲解谜', '音乐节奏'],

            {

                options: ['斗鱼', '虎牙', 'B站', '抖音'],
                answer: 2,
                explain: '御坂19039在B站（哔哩哔哩）进行直播。',
                source: '来源：B站直播间'
            },
            {
                q: '御坂19039的粉丝群号是多少？',
                options: ['769271000', '190390000', '145239000', '493190000'],
                answer: 0,
                explain: '粉丝群号是 769271000，欢迎加入！',
                source: '来源：应援站主页'
            },
            {
                q: '以下哪个不是御坂19039直播中常见的元素？',
                options: ['唱歌', '画画', '游戏', '烹饪'],
                answer: 3,
                explain: '御坂19039主要以游戏直播为主，也会唱歌、杂谈等，但烹饪并非直播常驻内容。',
                source: '来源：直播内容观察'

            {

                options: ['超电磁炮', '御坂妹妹', '呱太A', '学园都市'],
                answer: 2,
                explain: '粉丝勋章与「呱太A」相关，成为粉丝团成员后可以佩戴。',
                source: '来源：B站直播间'
            },
            {
                q: '这个应援站的主题色是什么？',
                options: ['蓝色', '粉色', '紫色', '黄色'],
                answer: 1,
                explain: '网站以粉色为主题色',
                source: '来源：应援站设计'
            },
            {
                q: '应援站中哪个功能可以查看御坂的最后直播时间？',
                options: ['时间轴', '往期回放', '语音按钮', '首页倒计时'],
                answer: 1,
                explain: '可通过应援站的「往期回放」功能，可以查看距离上次直播结束已经过去多久。',
                source: '来源：应援站首页'
            },
            {
                q: '御坂19039的性格特点最接近以下哪个描述？',
                options: ['高冷御姐', '元气少女', '腹黑深沉', '温柔知性'],
                answer: 1,
                explain: '御坂19039以元气、活泼的性格为主，直播氛围轻松愉快。',
                source: '来源：直播风格'
            }
        ];

        // ===== 音效加载 =====
        const SOUND_PATH = 'quiz/sounds/';
        const correctSound = new Audio(SOUND_PATH + 'correct.ogg');
        const wrongSound = new Audio(SOUND_PATH + 'wrong.ogg');
        const completeSound = new Audio(SOUND_PATH + 'complete.ogg');

        let currentIndex = 0;
        let score = 0;
        let answered = false;
        let currentQuestions = [];  // 当前使用的题目列表（10道）

        // ===== 洗牌函数 =====
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 从题库中随机抽取 N 道题
        function pickQuestions(count) {
            const shuffled = shuffle([...QUESTIONS]);
            return shuffled.slice(0, count);
        }

        // 处理单道题：打乱选项顺序，记录正确答案的新位置
        function shuffleOptions(question) {
            const options = question.options.map((text, idx) => ({ text, isCorrect: idx === question.answer }));
            const shuffled = shuffle([...options]);
            const newAnswer = shuffled.findIndex(opt => opt.isCorrect);
            return {
                ...question,
                options: shuffled.map(opt => opt.text),
                answer: newAnswer
            };
        }

        function startQuiz() {
            // 随机抽取10道题，并打乱选项
            const picked = pickQuestions(10);
            currentQuestions = picked.map(q => shuffleOptions(q));

            currentIndex = 0;
            score = 0;
            answered = false;

            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('progressSection').style.display = 'block';

            const questionArea = document.getElementById('questionArea');
            questionArea.classList.remove('hidden');

            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('totalQ').textContent = currentQuestions.length;

            showQuestion();
        }

        function showQuestion() {
            answered = false;
            const q = currentQuestions[currentIndex];

            document.getElementById('currentQ').textContent = currentIndex + 1;
            document.getElementById('liveScore').textContent = score;
            document.getElementById('qNumber').textContent = `第 ${currentIndex + 1} 题`;
            document.getElementById('qText').textContent = q.q;

            // 进度条
            const progress = ((currentIndex) / currentQuestions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';

            // 选项
            const container = document.getElementById('optionsContainer');
            container.innerHTML = '';
            q.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option';
                btn.textContent = opt;
                btn.dataset.index = i;
                btn.onclick = () => selectOption(i);
                container.appendChild(btn);
            });

            // 反馈隐藏
            const feedback = document.getElementById('feedback');
            feedback.classList.remove('show', 'correct', 'wrong');

            // 下一题隐藏
            document.getElementById('nextBtn').classList.remove('show');
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;

            const q = currentQuestions[currentIndex];
            const options = document.querySelectorAll('.option');

            options.forEach(opt => opt.classList.add('disabled'));
            options[index].classList.add('selected');

            const feedback = document.getElementById('feedback');

            if (index === q.answer) {
                score++;
                document.getElementById('liveScore').textContent = score;
                options[index].classList.add('correct');
                // 播放正确音效
                correctSound.currentTime = 0;
                correctSound.play().catch(() => {});

                feedback.className = 'feedback show correct';
                feedback.innerHTML = `✅ 回答正确！${q.explain}`;
            } else {
                options[index].classList.add('wrong');
                options[q.answer].classList.add('correct');
                // 播放错误音效
                wrongSound.currentTime = 0;
                wrongSound.play().catch(() => {});

                feedback.className = 'feedback show wrong';
                feedback.innerHTML = `❌ 答案不对哦~<br>${q.explain}`;
            }

            if (q.source) {
                feedback.innerHTML += `<span class="source">${q.source}</span>`;
            }

            const isLast = currentIndex >= currentQuestions.length - 1;
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.textContent = isLast ? '查看成绩 🏆' : '下一题 →';
            nextBtn.classList.add('show');
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= currentQuestions.length) {
                showResult();
            } else {
                showQuestion();
            }
        }

        function showResult() {
            document.getElementById('progressFill').style.width = '100%';

            // 播放完成音效
            completeSound.currentTime = 0;
            completeSound.play().catch(() => {});

            const questionArea = document.getElementById('questionArea');
            questionArea.classList.add('hidden');
            document.getElementById('optionsContainer').innerHTML = '';
            document.getElementById('feedback').classList.remove('show');
            document.getElementById('nextBtn').classList.remove('show');

            const total = currentQuestions.length;
            const accuracy = Math.round((score / total) * 100);

            document.getElementById('correctCount').textContent = score;
            document.getElementById('accuracy').textContent = accuracy + '%';

            let icon, title, rank, message;

            if (score >= 9) {
                icon = '👑';
                title = '传说中的铁粉！';
                rank = '🏅 硬核级·呱太A长老';
                message = '你太厉害了！御坂19039的一切你都了如指掌，绝对是铁杆中的铁杆！';
            } else if (score >= 7) {
                icon = '🌟';
                title = '优秀粉丝！';
                rank = '🥈 进阶级·忠实呱太A';
                message = '你对御坂19039的了解已经很深入了，继续加油争取满分吧！';
            } else if (score >= 5) {
                icon = '💪';
                title = '不错的成绩！';
                rank = '🥉 普通级·呱太A成员';
                message = '还算了解御坂19039，不过还有提升空间哦，多看看直播吧~';
            } else {
                icon = '📖';
                title = '需要补课哦~';
                rank = '🌱 萌新级·新加入呱太A';
                message = '看来你对御坂19039还不太了解，快去B站关注一波，多看看直播和动态吧！';
            }

            document.getElementById('resultIcon').textContent = icon;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultRank').textContent = rank;
            document.getElementById('resultMessage').textContent = message;

            document.getElementById('resultArea').classList.add('show');
        }
    </script>
</body>
</html>
